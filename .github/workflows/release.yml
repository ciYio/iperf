name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Prepare binary
        run: |
          cp target/x86_64-unknown-linux-musl/release/iperf iperf-${{ github.ref_name }}-linux-amd64
          chmod +x iperf-${{ github.ref_name }}-linux-amd64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: iperf ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            iperf-${{ github.ref_name }}-linux-amd64
